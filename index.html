<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Auto — Soluciones a medida para profesionales independientes y pymes en Las Palmas de Gran Canaria</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #111111;
      --red:    #D0021B;
      --bg:     #F7F7F7;
      --white:  #FFFFFF;
      --muted:  #888888;
      --border: #DDDDDD;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--black);
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 100;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      background: rgba(247,247,247,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--black);
    }
    .nav-logo .auto { color: var(--red); }
    .nav-center { display: flex; gap: 32px; }
    .nav-center a {
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .nav-center a:hover, .nav-center a.active { color: var(--black); }
    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      user-select: none;
      transition: color 0.15s;
    }
    .lang-toggle:hover { color: var(--black); }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* ── Hero ── */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-top: 60px;
    }
    .hero-inner {
      max-width: 1080px;
      margin: 0 auto;
      padding: 100px 40px 80px;
    }
    .problem {
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1.1;
      color: var(--black);
      max-width: 780px;
      margin-bottom: 28px;
      transition: opacity 0.35s ease;
      min-height: 1.1em;
    }
    .agitate {
      font-size: clamp(16px, 2vw, 19px);
      font-weight: 500;
      color: var(--red);
      margin-bottom: 20px;
      max-width: 560px;
    }
    .solve {
      font-size: clamp(15px, 1.8vw, 17px);
      color: var(--muted);
      line-height: 1.7;
      max-width: 520px;
      margin-bottom: 40px;
    }
    .btn-primary {
      display: inline-block;
      background: var(--black);
      color: #fff;
      padding: 14px 32px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--red); }

    /* ── Contact ── */
    .section {
      border-top: 1px solid var(--border);
      padding: 96px 0;
    }
    .section-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 12px;
    }
    .section-h2 {
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.15;
      margin-bottom: 14px;
    }
    .section-lead {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 500px;
      margin-bottom: 0;
    }

    .contact-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }
    @media (max-width: 680px) {
      .contact-layout { grid-template-columns: 1fr; gap: 40px; }
    }

    .form-stack { display: flex; flex-direction: column; gap: 10px; }
    .form-stack input,
    .form-stack textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 13px 16px;
      font-size: 15px;
      font-family: inherit;
      background: #fff;
      color: var(--black);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-stack input:focus,
    .form-stack textarea:focus { border-color: var(--black); }
    .form-stack input::placeholder,
    .form-stack textarea::placeholder { color: #BBBBBB; }
    .form-stack textarea { resize: vertical; min-height: 90px; }

    .form-stack button {
      width: 100%;
      border: none;
      background: var(--black);
      color: #fff;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .form-stack button:hover:not(:disabled) { background: var(--red); }
    .form-stack button:disabled { opacity: 0.4; cursor: default; }

    .form-error  { font-size: 13px; color: var(--red); }
    .success-msg { font-size: 15px; font-weight: 500; color: var(--black); }

    /* ── Footer ── */
    .footer-wrap { max-width: 1080px; margin: 0 auto; }
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      nav { padding: 0 20px; }
      .nav-center { display: none; }
      .hero-inner, .wrap, footer { padding-left: 20px; padding-right: 20px; }
      footer { flex-direction: column; gap: 6px; text-align: center; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="#"><span>simple</span><span class="auto">auto</span></a>
    <div class="nav-center">
      <a href="services.html"  id="nav-services"></a>
      <a href="sectores.html"  id="nav-profesiones"></a>
      <a href="proyectos.html" id="nav-portfolio"></a>
      <a href="#contact"       id="nav-contact"></a>
    </div>
    <div class="lang-toggle" onclick="toggleLang()">
      <span id="flag">🇬🇧</span>
      <span id="lang-label">EN</span>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-inner">
      <p class="problem" id="problem-text"></p>
      <p class="agitate" id="t-agitate"></p>
      <p class="solve"   id="t-solve"></p>
      <a href="#contact" class="btn-primary" id="t-cta"></a>
    </div>
  </div>

  <section class="section" id="contact">
    <div class="wrap">
      <div class="contact-layout">
        <div>
          <p class="section-eyebrow" id="t-ct-ey"></p>
          <h2 class="section-h2"    id="t-ct-h2"></h2>
          <p class="section-lead"   id="t-ct-lead"></p>
        </div>
        <div>
          <div id="form-wrap" class="form-stack">
            <input  type="text"  id="f-name" />
            <input  type="email" id="f-email" />
            <input  type="tel"   id="f-phone" />
            <textarea            id="f-message" rows="3"></textarea>
            <button type="button" id="t-btn" onclick="handleSubmit()"></button>
            <p class="form-error hidden" id="form-error"></p>
          </div>
          <p class="success-msg hidden" id="success-msg"></p>
        </div>
      </div>
    </div>
  </section>

  <div class="footer-wrap">
    <footer>
      <span>© 2026 Simple Auto</span>
      <span id="t-footer"></span>
    </footer>
  </div>

  <script>
    var lang = 'es';

    var problems = {
      es: [
        'Las conversaciones con clientes\nse pierden en WhatsApp.',
        'Copias leads de Idealista\nal Excel a mano. Cada día.',
        'Tardas cuatro horas en responder.\nEl cliente ya contrató a otro.',
        'Tu negocio funciona.\nLa operativa interna, no.'
      ],
      en: [
        'Client conversations\ndisappear into WhatsApp.',
        'You copy Idealista leads\ninto Excel by hand. Every day.',
        'You reply four hours later.\nThe client already hired someone else.',
        'Your business runs.\nThe back office doesn\'t.'
      ]
    };
    var probIdx = 0;
    var probEl;

    var copy = {
      es: {
        'nav-services':    'Servicios',
        'nav-profesiones': 'Sectores',
        'nav-portfolio':   'Proyectos',
        'nav-contact':     'Contacto',

        agitate: 'Cada atasco invisible te cuesta horas y clientes.',
        solve:   'Construimos a medida los sistemas que tu negocio necesita por dentro. No somos una agencia de marketing.',
        cta:     'Hablemos',

        'ct-ey':   'Contacto',
        'ct-h2':   'Cuéntanos qué se atasca.',
        'ct-lead': 'Una llamada de 20 minutos. Identificamos dónde se atasca tu negocio y te decimos si podemos arreglarlo. Sin compromiso.',
        ph_name:   'Nombre',
        ph_email:  'Correo electrónico',
        ph_phone:  'Teléfono',
        ph_msg:    'Qué te roba más tiempo cada semana (opcional)',
        btn:       'Enviar',
        success:   'Listo. Te contactamos pronto.',
        error:     'Algo salió mal. Intenta de nuevo.',

        footer: 'Las Palmas de Gran Canaria.'
      },
      en: {
        'nav-services':    'Services',
        'nav-profesiones': 'Sectors',
        'nav-portfolio':   'Work',
        'nav-contact':     'Contact',

        agitate: 'Every invisible bottleneck costs you hours and clients.',
        solve:   'We custom-build the systems your business needs under the hood. We\'re not a marketing agency.',
        cta:     'Let\'s talk',

        'ct-ey':   'Contact',
        'ct-h2':   'Tell us what\'s stuck.',
        'ct-lead': 'A 20-minute call. We find where your business gets stuck and tell you if we can fix it. No commitment.',
        ph_name:   'Name',
        ph_email:  'Email address',
        ph_phone:  'Phone',
        ph_msg:    'What eats most of your time each week (optional)',
        btn:       'Send',
        success:   'Got it. We\'ll be in touch soon.',
        error:     'Something went wrong. Please try again.',

        footer: 'Las Palmas de Gran Canaria.'
      }
    };

    var idMap = [
      ['nav-services',    'nav-services'],
      ['nav-profesiones', 'nav-profesiones'],
      ['nav-portfolio',   'nav-portfolio'],
      ['nav-contact',     'nav-contact'],
      ['t-agitate', 'agitate'],
      ['t-solve',   'solve'],
      ['t-cta',     'cta'],
      ['t-ct-ey',   'ct-ey'],
      ['t-ct-h2',   'ct-h2'],
      ['t-ct-lead', 'ct-lead'],
      ['t-btn',     'btn'],
      ['t-footer',  'footer']
    ];

    function renderProblem() {
      if (!probEl) return;
      probEl.innerHTML = problems[lang][probIdx].split('\n').join('<br>');
    }

    function cycleProblem() {
      probEl.style.opacity = '0';
      setTimeout(function() {
        probIdx = (probIdx + 1) % problems[lang].length;
        renderProblem();
        probEl.style.opacity = '1';
      }, 350);
    }

    function setLang(l) {
      lang = l;
      var c = copy[l];
      idMap.forEach(function(pair) {
        var el = document.getElementById(pair[0]);
        if (el) el.textContent = c[pair[1]];
      });
      renderProblem();
      document.getElementById('f-name').placeholder    = c.ph_name;
      document.getElementById('f-email').placeholder   = c.ph_email;
      document.getElementById('f-phone').placeholder   = c.ph_phone;
      document.getElementById('f-message').placeholder = c.ph_msg;
      document.getElementById('flag').textContent       = l === 'es' ? '🇬🇧' : '🇪🇸';
      document.getElementById('lang-label').textContent = l === 'es' ? 'EN' : 'ES';
      document.documentElement.lang = l;
    }

    function toggleLang() { setLang(lang === 'es' ? 'en' : 'es'); }

    function handleSubmit() {
      var email = document.getElementById('f-email').value.trim();
      if (!email) { document.getElementById('f-email').focus(); return; }

      var btn = document.getElementById('t-btn');
      btn.disabled = true;
      btn.textContent = '...';

      var name  = document.getElementById('f-name').value.trim();
      var phone = document.getElementById('f-phone').value.trim();
      var msg   = document.getElementById('f-message').value.trim();

      var parts = [];
      if (name)  parts.push('Nombre: '   + name);
      if (phone) parts.push('Teléfono: ' + phone);
      if (msg)   parts.push('Mensaje: '  + msg);

      var data = new FormData();
      data.append('email',   email);
      data.append('message', parts.join('\n'));

      fetch('https://formspree.io/f/mkoydwkl', {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      })
      .then(function(r) { return r.json().then(function(j) { return { ok: r.ok, j: j }; }); })
      .then(function(res) {
        if (res.ok) {
          document.getElementById('form-wrap').classList.add('hidden');
          var el = document.getElementById('success-msg');
          el.textContent = copy[lang].success;
          el.classList.remove('hidden');
        } else { throw new Error(); }
      })
      .catch(function() {
        var err = document.getElementById('form-error');
        err.textContent = copy[lang].error;
        err.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = copy[lang].btn;
      });
    }

    probEl = document.getElementById('problem-text');
    setLang('es');
    setInterval(cycleProblem, 3500);
  </script>
</body>
</html>
