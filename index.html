<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Auto</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111111;
      --red: #D0021B;
      --bg: #F7F7F7;
      --muted: #888888;
      --border: #DDDDDD;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .lang-toggle {
      position: fixed;
      top: 20px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      user-select: none;
      z-index: 100;
      transition: color 0.2s;
    }
    .lang-toggle:hover { color: var(--black); }
    .lang-toggle .flag { font-size: 18px; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px 24px 48px;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      margin-bottom: 40px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .logo {
      font-size: clamp(48px, 10vw, 88px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 28px;
    }
    .logo .simple { color: var(--black); }
    .logo .auto   { color: var(--red); }

    .tagline {
      font-size: clamp(16px, 2.5vw, 20px);
      color: var(--muted);
      max-width: 480px;
      line-height: 1.55;
      margin-bottom: 12px;
    }
    .tagline strong { color: var(--black); font-weight: 600; }

    .sub {
      font-size: 14px;
      color: var(--muted);
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    /* ── Form ── */
    .form-stack {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: left;
    }

    .form-stack input,
    .form-stack textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 13px 16px;
      font-size: 15px;
      font-family: inherit;
      background: #fff;
      color: var(--black);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-stack input:focus,
    .form-stack textarea:focus { border-color: var(--black); }
    .form-stack input::placeholder,
    .form-stack textarea::placeholder { color: #BBBBBB; }

    .form-stack textarea {
      resize: vertical;
      min-height: 90px;
    }

    .form-stack button {
      width: 100%;
      border: none;
      background: var(--black);
      color: #fff;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .form-stack button:hover:not(:disabled) { background: var(--red); }
    .form-stack button:disabled { opacity: 0.4; cursor: default; }

    .form-error {
      font-size: 13px;
      color: var(--red);
    }

    .success-msg {
      font-size: 15px;
      font-weight: 500;
      color: var(--black);
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: var(--border);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="lang-toggle" onclick="toggleLang()">
    <span class="flag" id="flag">🇬🇧</span>
    <span id="lang-label">EN</span>
  </div>

  <main>
    <div class="badge"><span class="dot"></span> <span id="t-badge"></span></div>

    <div class="logo">
      <span class="simple">simple</span><span class="auto">auto</span>
    </div>

    <p class="tagline"><strong id="t-headline"></strong><br><span id="t-sub"></span></p>

    <p class="sub" id="t-construction"></p>

    <div id="form-wrap" class="form-stack">
      <input type="text"  id="f-name"    />
      <input type="email" id="f-email"   />
      <input type="tel"   id="f-phone"   />
      <textarea           id="f-message" rows="3"></textarea>
      <button type="button" id="t-btn" onclick="handleSubmit()"></button>
      <p class="form-error hidden" id="form-error"></p>
    </div>

    <p class="success-msg hidden" id="success-msg"></p>
  </main>

  <footer>© 2026 Simple Auto</footer>

  <script>
    var lang = 'es';

    var copy = {
      es: {
        badge:        'En construcción',
        headline:     'Encárgate de tu negocio.',
        sub:          'Nosotros te hacemos la parte digital.',
        construction: 'Esta página está en construcción. Si quieres saber más, déjanos tus datos y te contactamos.',
        ph_name:      'Nombre',
        ph_email:     'Correo electrónico',
        ph_phone:     'Teléfono',
        ph_message:   'Mensaje (opcional)',
        btn:          'Enviar',
        success:      'Listo. Te contactamos pronto.',
        error:        'Algo salió mal. Intenta de nuevo.'
      },
      en: {
        badge:        'Under construction',
        headline:     'Run your business.',
        sub:          'We handle the digital side.',
        construction: 'This page is under construction. Leave your details and we\'ll reach out.',
        ph_name:      'Name',
        ph_email:     'Email address',
        ph_phone:     'Phone',
        ph_message:   'Message (optional)',
        btn:          'Send',
        success:      'Got it. We\'ll be in touch soon.',
        error:        'Something went wrong. Please try again.'
      }
    };

    function setLang(l) {
      lang = l;
      var c = copy[l];
      document.getElementById('t-badge').textContent        = c.badge;
      document.getElementById('t-headline').textContent     = c.headline;
      document.getElementById('t-sub').textContent          = c.sub;
      document.getElementById('t-construction').textContent = c.construction;
      document.getElementById('f-name').placeholder         = c.ph_name;
      document.getElementById('f-email').placeholder        = c.ph_email;
      document.getElementById('f-phone').placeholder        = c.ph_phone;
      document.getElementById('f-message').placeholder      = c.ph_message;
      document.getElementById('t-btn').textContent          = c.btn;
      document.getElementById('flag').textContent           = l === 'es' ? '🇬🇧' : '🇪🇸';
      document.getElementById('lang-label').textContent     = l === 'es' ? 'EN' : 'ES';
      document.documentElement.lang = l;
    }

    function toggleLang() {
      setLang(lang === 'es' ? 'en' : 'es');
    }

    function handleSubmit() {
      var name    = document.getElementById('f-name').value.trim();
      var email   = document.getElementById('f-email').value.trim();
      var phone   = document.getElementById('f-phone').value.trim();
      var message = document.getElementById('f-message').value.trim();

      if (!email) { document.getElementById('f-email').focus(); return; }

      var btn = document.getElementById('t-btn');
      btn.disabled = true;
      btn.textContent = '...';

      var parts = [];
      if (name)    parts.push('Nombre: '   + name);
      if (phone)   parts.push('Teléfono: ' + phone);
      if (message) parts.push('Mensaje: '  + message);

      var data = new FormData();
      data.append('email',   email);
      data.append('message', parts.join('\n'));

      fetch('https://formspree.io/f/mkoydwkl', {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      })
      .then(function(res) { return res.json().then(function(json) { return { ok: res.ok, json: json }; }); })
      .then(function(result) {
        if (result.ok) {
          document.getElementById('form-wrap').classList.add('hidden');
          document.getElementById('t-construction').classList.add('hidden');
          var msg = document.getElementById('success-msg');
          msg.textContent = copy[lang].success;
          msg.classList.remove('hidden');
        } else {
          throw new Error('error');
        }
      })
      .catch(function() {
        var err = document.getElementById('form-error');
        err.textContent = copy[lang].error;
        err.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = copy[lang].btn;
      });
    }

    setLang('es');
  </script>
</body>
</html>
