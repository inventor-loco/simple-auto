    function buildToc(items) {
      var el = document.getElementById('toc-list');
      el.innerHTML = '';
      items.forEach(function(text, i) {
        var li = document.createElement('li');
        var num = String(i + 1).padStart(2, '0');
        li.innerHTML = '<a href="#g-' + num + '"><span class="toc-num">' + num + '</span>' + text + '</a>';
        el.appendChild(li);
      });
    }

    function buildGuide(blocks) {
      var el = document.getElementById('guide-blocks');
      el.innerHTML = '';
      blocks.forEach(function(b) {
        var div = document.createElement('div');
        div.className = 'guide-block';
        div.id = 'g-' + b.num;
        div.innerHTML =
          '<span class="guide-num">' + b.num + '</span>' +
          '<h2 class="guide-h2">' + b.h2 + '</h2>' +
          '<div class="guide-body">' + b.html + '</div>';
        el.appendChild(div);
      });
    }

    function setLang(l) {
      lang = l;
      var c = copy[l];
      simpleIds.forEach(function(pair) {
        var el = document.getElementById(pair[0]);
        if (el) el.textContent = c[pair[1]];
      });
      buildToc(c['toc']);
      buildGuide(c['guide']);
      document.getElementById('f-name').placeholder    = c.ph_name;
      document.getElementById('f-email').placeholder   = c.ph_email;
      document.getElementById('f-phone').placeholder   = c.ph_phone;
      document.getElementById('f-message').placeholder = c.ph_msg;
      document.getElementById('flag').textContent       = l === 'es' ? '🇬🇧' : '🇪🇸';
      document.getElementById('lang-label').textContent = l === 'es' ? 'EN' : 'ES';
      document.documentElement.lang = l;
    }

    function toggleLang() { setLang(lang === 'es' ? 'en' : 'es'); }

    function handleSubmit() {
      var email = document.getElementById('f-email').value.trim();
      if (!email) { document.getElementById('f-email').focus(); return; }

      var btn = document.getElementById('t-btn');
      btn.disabled = true;
      btn.textContent = '...';

      var name  = document.getElementById('f-name').value.trim();
      var phone = document.getElementById('f-phone').value.trim();
      var msg   = document.getElementById('f-message').value.trim();

      var parts = [];
      if (name)  parts.push('Nombre: '   + name);
      if (phone) parts.push('Teléfono: ' + phone);
      if (msg)   parts.push('Mensaje: '  + msg);
      parts.push('Funnel: ' + FUNNEL);

      var data = new FormData();
      data.append('email',    email);
      data.append('message',  parts.join('\n'));
      data.append('_subject', 'Nuevo lead — funnel ' + FUNNEL);
      data.append('funnel',   FUNNEL);

      fetch('https://formspree.io/f/mkoydwkl', {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      })
      .then(function(r) { return r.json().then(function(j) { return { ok: r.ok, j: j }; }); })
      .then(function(res) {
        if (res.ok) {
          document.getElementById('form-wrap').classList.add('hidden');
          var el = document.getElementById('success-msg');
          el.textContent = copy[lang].success;
          el.classList.remove('hidden');
        } else { throw new Error(); }
      })
      .catch(function() {
        var err = document.getElementById('form-error');
        err.textContent = copy[lang].error;
        err.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = copy[lang].btn;
      });
    }

    setLang('es');
  </script>
