  <script>

        ],

        'guide': [
          {
            'num': '01',
            'h2': 'Cómo te buscan en Gran Canaria',
            'html': '<p>El cliente de un arquitecto en Gran Canaria se divide básicamente en dos perfiles: el promotor (constructora, inversor, propietario que va a hacer obra nueva o reforma grande) y el particular (alguien que necesita un trámite administrativo concreto). Buscan de forma muy distinta.</p>' +
                    '<table class="keyword-table">' +
                      '<thead><tr><th>Búsqueda</th><th>Quién la hace · intención</th></tr></thead>' +
                      '<tbody>' +
                      '<tr><td><code>arquitecto las palmas</code></td><td>Genérica · alta competencia</td></tr>' +
                      '<tr><td><code>arquitecto vivienda unifamiliar gran canaria</code></td><td>Promotor o particular · proyecto grande</td></tr>' +
                      '<tr><td><code>proyecto reforma vivienda gran canaria</code></td><td>Particular · va a contratar</td></tr>' +
                      '<tr><td><code>cédula habitabilidad las palmas</code></td><td>Particular · trámite urgente</td></tr>' +
                      '<tr><td><code>certificado eficiencia energética las palmas</code></td><td>Particular · venta o alquiler</td></tr>' +
                      '<tr><td><code>licencia de obra ayuntamiento las palmas</code></td><td>Promotor o particular · trámite</td></tr>' +
                      '<tr><td><code>arquitecto cambio de uso local</code></td><td>Inversor o autónomo · alta intención</td></tr>' +
                      '<tr><td><code>dirección de obra las palmas</code></td><td>Promotor · servicio específico</td></tr>' +
                      '<tr><td><code>arquitecto estudio gran canaria</code></td><td>Cliente comparando estudios</td></tr>' +
                      '</tbody>' +
                    '</table>' +
                    '<p><strong>Las búsquedas administrativas son la mina de oro.</strong> «Cédula de habitabilidad en Las Palmas» tiene muchísimo más tráfico cualificado que «arquitecto las palmas» — y casi ningún estudio tiene una página dedicada a ella. La persona que busca esto necesita exactamente lo que tú puedes firmar.</p>' +
                    '<div class="callout">Acción concreta: lista los cinco trámites que firmas con más frecuencia (cédula, CEE, certificados, licencias, cambios de uso). Cada uno merece una página propia. Cada página captura tráfico de búsqueda activa que casi nadie está pescando.</div>'
          },
          {
            'num': '02',
            'h2': 'Trust signals para arquitectos colegiados',
            'html': '<p>La elección de un arquitecto es muy personal — más que la de un abogado o un asesor. El cliente quiere ver quién es la persona que va a entrar en su casa, hablar con su constructor y firmar su proyecto. Una web sin foto del titular es una web que pierde clientes en silencio.</p>' +
                    '<p>Checklist de trust signals para un estudio:</p>' +
                    '<ul>' +
                      '<li><strong>Número de colegiado COAC visible</strong> en el footer. Colegio Oficial de Arquitectos de Canarias, Demarcación de Las Palmas. Es señal de que firmas legalmente. Sin esto, eres «alguien que diseña».</li>' +
                      '<li><strong>Foto y nombre del titular o socios</strong>. Real, no de stock. El cliente quiere ver con quién va a hablar.</li>' +
                      '<li><strong>Selección curada de 6–10 proyectos</strong>, no 40. Calidad > cantidad. Mejor seis proyectos contados bien que cincuenta miniaturas.</li>' +

                      '<li><strong>CV/portfolio descargable en PDF</strong>. Para promotores que quieren llevárselo a una reunión interna.</li>' +
                    '</ul>'
          },
          {
            'num': '03',
            'h2': 'Página de proyecto: plantilla',
            'html': '<p>El error más común en webs de arquitectos es el portfolio en cuadrícula: 12 miniaturas, una palabra de título cada una, un lightbox al hacer clic. Es bonito pero no convence. Un promotor que evalúa contratarte quiere entender un proyecto, no solo verlo.</p>' +
                    '<p>Esta es la plantilla que recomendamos para una página dedicada por proyecto (una URL propia, indexable, citable):</p>' +
                    '<h3>Estructura de una página de proyecto</h3>' +
                    '<ol>' +
                      '<li><strong>Foto hero a tamaño completo</strong>. La mejor del proyecto. Sin texto encima.</li>' +
                      '<li><strong>Datos clave en bloque</strong>:' +
                        '<ul>' +

    function buildToc(items) {
      var el = document.getElementById('toc-list');
      el.innerHTML = '';
      items.forEach(function(text, i) {
        var li = document.createElement('li');
        var num = String(i + 1).padStart(2, '0');
        li.innerHTML = '<a href="#g-' + num + '"><span class="toc-num">' + num + '</span>' + text + '</a>';
        el.appendChild(li);
      });
    }

    function buildGuide(blocks) {
      var el = document.getElementById('guide-blocks');
      el.innerHTML = '';
      blocks.forEach(function(b) {
        var div = document.createElement('div');
        div.className = 'guide-block';
        div.id = 'g-' + b.num;
        div.innerHTML =
          '<span class="guide-num">' + b.num + '</span>' +
          '<h2 class="guide-h2">' + b.h2 + '</h2>' +
          '<div class="guide-body">' + b.html + '</div>';
        el.appendChild(div);
      });
    }

    function setLang(l) {
      lang = l;
      var c = copy[l];
      simpleIds.forEach(function(pair) {
        var el = document.getElementById(pair[0]);
        if (el) el.textContent = c[pair[1]];
      });
      buildToc(c['toc']);
      buildGuide(c['guide']);
      document.getElementById('f-name').placeholder    = c.ph_name;
      document.getElementById('f-email').placeholder   = c.ph_email;
      document.getElementById('f-phone').placeholder   = c.ph_phone;
      document.getElementById('f-message').placeholder = c.ph_msg;
      document.getElementById('flag').textContent       = l === 'es' ? '🇬🇧' : '🇪🇸';
      document.getElementById('lang-label').textContent = l === 'es' ? 'EN' : 'ES';
      document.documentElement.lang = l;
    }

    function toggleLang() { setLang(lang === 'es' ? 'en' : 'es'); }

    function handleSubmit() {
      var email = document.getElementById('f-email').value.trim();
      if (!email) { document.getElementById('f-email').focus(); return; }

      var btn = document.getElementById('t-btn');
      btn.disabled = true;
      btn.textContent = '...';

      var name  = document.getElementById('f-name').value.trim();
      var phone = document.getElementById('f-phone').value.trim();
      var msg   = document.getElementById('f-message').value.trim();

      var parts = [];
      if (name)  parts.push('Nombre: '   + name);
      if (phone) parts.push('Teléfono: ' + phone);
      if (msg)   parts.push('Mensaje: '  + msg);
      parts.push('Funnel: ' + FUNNEL);

      var data = new FormData();
      data.append('email',    email);
      data.append('message',  parts.join('\n'));
      data.append('_subject', 'Nuevo lead — funnel ' + FUNNEL);
      data.append('funnel',   FUNNEL);

      fetch('https://formspree.io/f/mkoydwkl', {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      })
      .then(function(r) { return r.json().then(function(j) { return { ok: r.ok, j: j }; }); })
      .then(function(res) {
        if (res.ok) {
          document.getElementById('form-wrap').classList.add('hidden');
          var el = document.getElementById('success-msg');
          el.textContent = copy[lang].success;
          el.classList.remove('hidden');
        } else { throw new Error(); }
      })
      .catch(function() {
        var err = document.getElementById('form-error');
        err.textContent = copy[lang].error;
        err.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = copy[lang].btn;
      });
    }

    setLang('es');
  </script>
