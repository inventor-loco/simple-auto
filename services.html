<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Servicios — Simple Auto</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #111111;
      --red:    #D0021B;
      --bg:     #F7F7F7;
      --white:  #FFFFFF;
      --muted:  #888888;
      --border: #DDDDDD;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--black);
    }

    nav {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 100;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      background: rgba(247,247,247,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--black);
    }
    .nav-logo .auto { color: var(--red); }
    .nav-center { display: flex; gap: 32px; }
    .nav-center a {
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .nav-center a:hover, .nav-center a.active { color: var(--black); }
    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      user-select: none;
      transition: color 0.15s;
    }
    .lang-toggle:hover { color: var(--black); }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 40px;
    }

    .page-hero {
      padding: 140px 0 60px;
    }
    .page-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 16px;
    }
    .page-h1 {
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1.1;
      margin-bottom: 18px;
    }
    .page-lead {
      font-size: 17px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 560px;
    }

    /* ── Accordion ── */
    .acc-list {
      padding-bottom: 96px;
    }
    .acc {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .acc[open] { border-color: var(--black); }
    .acc summary {
      list-style: none;
      cursor: pointer;
      padding: 22px 26px;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .acc summary::-webkit-details-marker { display: none; }
    .acc-icon {
      font-size: 22px;
      line-height: 1;
      flex-shrink: 0;
    }
    .acc-titles {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .acc-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .acc-tag {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
    }
    .acc-chev {
      font-size: 18px;
      color: var(--muted);
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .acc[open] .acc-chev { transform: rotate(45deg); color: var(--red); }
    .acc-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .acc-badge.on   { background: var(--black); color: #fff; }
    .acc-badge.soon { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
    .acc-body {
      padding: 0 26px 26px 66px;
      font-size: 14px;
      color: #444;
      line-height: 1.7;
    }
    @media (max-width: 540px) {
      .acc-body { padding-left: 26px; }
    }

    /* ── Bottom CTA ── */
    .end-cta {
      border-top: 1px solid var(--border);
      padding: 64px 40px;
      text-align: center;
    }
    .end-cta-h {
      font-size: clamp(22px, 3vw, 28px);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
    }
    .btn-primary {
      display: inline-block;
      background: var(--black);
      color: #fff;
      padding: 14px 32px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--red); }

    .footer-wrap { max-width: 1080px; margin: 0 auto; }
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      nav { padding: 0 20px; }
      .nav-center { display: none; }
      .wrap, footer, .end-cta { padding-left: 20px; padding-right: 20px; }
      footer { flex-direction: column; gap: 6px; text-align: center; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html"><span>simple</span><span class="auto">auto</span></a>
    <div class="nav-center">
      <a href="services.html"  class="active" id="nav-services"></a>
      <a href="sectores.html"  id="nav-profesiones"></a>

    </div>
    <div class="lang-toggle" onclick="toggleLang()">

  <div class="wrap">

    <div class="acc-list">

      <details class="acc">
        <summary>

      </details>

          </span>

        </summary>
        <div class="acc-body" id="t-s2-body"></div>
      </details>

      <details class="acc">
        <summary>
          <span class="acc-icon">📡</span>
          <span class="acc-titles">

        </summary>
        <div class="acc-body" id="t-s3-body"></div>
      </details>

      <details class="acc">
        <summary>
          <span class="acc-icon">🎬</span>
          <span class="acc-titles">
            <span class="acc-name" id="t-s4-name"></span>
            <span class="acc-tag"  id="t-s4-tag"></span>
          </span>
          <span class="acc-badge on" id="t-s4-badge"></span>
          <span class="acc-chev">＋</span>
        </summary>
        <div class="acc-body" id="t-s4-body"></div>
      </details>

      <details class="acc">
        <summary>
          <span class="acc-icon">🌐</span>
          <span class="acc-titles">
            <span class="acc-name" id="t-s5-name"></span>
            <span class="acc-tag"  id="t-s5-tag"></span>
          </span>
          <span class="acc-badge on" id="t-s5-badge"></span>
          <span class="acc-chev">＋</span>
        </summary>
        <div class="acc-body" id="t-s5-body"></div>
      </details>

      <details class="acc">
        <summary>
          <span class="acc-icon">📈</span>
          <span class="acc-titles">
            <span class="acc-name" id="t-s6-name"></span>
            <span class="acc-tag"  id="t-s6-tag"></span>
          </span>
          <span class="acc-badge on" id="t-s6-badge"></span>
          <span class="acc-chev">＋</span>
        </summary>
        <div class="acc-body" id="t-s6-body"></div>
      </details>

    </div>
  </div>

  <section class="end-cta">
    <h3 class="end-cta-h" id="t-cta-h"></h3>
    <a href="index.html#contact" class="btn-primary" id="t-cta"></a>
  </section>

  <div class="footer-wrap">
    <footer>
      <span>© 2026 Simple Auto</span>
      <span id="t-footer"></span>
    </footer>
  </div>

    var idMap = [
      ['nav-services',    'nav-services'],
      ['nav-profesiones', 'nav-profesiones'],
      ['nav-portfolio',   'nav-portfolio'],
      ['nav-contact',     'nav-contact'],
      ['t-ey','ey'], ['t-h1','h1'], ['t-lead','lead'],
      ['t-s1-name','s1-name'], ['t-s1-tag','s1-tag'], ['t-s1-body','s1-body'], ['t-s1-badge','s1-badge'],
      ['t-s2-name','s2-name'], ['t-s2-tag','s2-tag'], ['t-s2-body','s2-body'], ['t-s2-badge','s2-badge'],

    function setLang(l) {
      lang = l;
      var c = copy[l];
      idMap.forEach(function(pair) {
        var el = document.getElementById(pair[0]);
        if (el) el.textContent = c[pair[1]];
      });
      document.getElementById('flag').textContent       = l === 'es' ? '🇬🇧' : '🇪🇸';
      document.getElementById('lang-label').textContent = l === 'es' ? 'EN' : 'ES';
      document.documentElement.lang = l;
    }
    function toggleLang() { setLang(lang === 'es' ? 'en' : 'es'); }

    setLang('es');
  </script>
</body>
</html>
