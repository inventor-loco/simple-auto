<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Servicios — Simple Auto</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #111111;
      --red:    #D0021B;
      --bg:     #F7F7F7;
      --white:  #FFFFFF;
      --muted:  #888888;
      --border: #DDDDDD;
      --light:  #F0F0F0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--black);
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 100;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      background: rgba(247,247,247,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--black);
    }
    .nav-logo .auto { color: var(--red); }
    .nav-center { display: flex; gap: 32px; }
    .nav-center a {
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .nav-center a:hover, .nav-center a.active { color: var(--black); }
    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      user-select: none;
      transition: color 0.15s;
    }
    .lang-toggle:hover { color: var(--black); }

    /* ── Layout ── */
    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* ── Page hero ── */
    .page-hero {
      padding: 140px 0 80px;
      border-bottom: 1px solid var(--border);
    }
    .page-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 20px;
    }
    .page-h1 {
      font-size: clamp(36px, 6vw, 60px);
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1.1;
      margin-bottom: 20px;
      max-width: 700px;
    }
    .page-lead {
      font-size: 17px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 560px;
    }

    /* ── Service block ── */
    .svc-block {
      border-bottom: 1px solid var(--border);
      padding: 80px 0;
    }

    .svc-header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .svc-num {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .svc-h2 {
      font-size: clamp(26px, 4vw, 38px);
      font-weight: 700;
      letter-spacing: -0.025em;
    }
    .svc-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 9px;
      border-radius: 4px;
    }
    .svc-badge.on   { background: var(--black); color: #fff; }
    .svc-badge.soon { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }

    .svc-tagline {
      font-size: 17px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 640px;
      margin-bottom: 52px;
    }

    /* ── Service detail grid ── */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px;
      margin-bottom: 48px;
    }
    @media (max-width: 700px) {
      .detail-grid { grid-template-columns: 1fr; gap: 40px; }
    }

    .detail-col h3 {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* ── Include list ── */
    .include-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 40px;
    }
    .include-list li {
      font-size: 15px;
      line-height: 1.5;
      display: flex;
      gap: 12px;
    }
    .include-list li::before {
      content: '✓';
      font-size: 13px;
      font-weight: 700;
      color: var(--black);
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── You bring list ── */
    .bring-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .bring-list li {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
      display: flex;
      gap: 10px;
    }
    .bring-list li::before {
      content: '→';
      font-size: 12px;
      color: var(--border);
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* ── Process steps ── */
    .process-steps {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .step {
      display: flex;
      gap: 20px;
      position: relative;
    }
    .step:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 11px;
      top: 28px;
      bottom: 0;
      width: 1px;
      background: var(--border);
    }
    .step-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .step-body {
      padding-bottom: 28px;
    }
    .step-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .step-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .timeline-note {
      margin-top: 24px;
      font-size: 13px;
      color: var(--muted);
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      display: inline-block;
    }

    /* ── Empowerment callout ── */
    .empower-box {
      background: var(--white);
      border: 1px solid var(--border);
      border-left: 3px solid var(--black);
      border-radius: 6px;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .empower-box strong {
      font-size: 14px;
      font-weight: 700;
    }
    .empower-box p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.65;
    }

    /* ── Philosophy ── */
    .philosophy {
      padding: 80px 0;
      border-bottom: 1px solid var(--border);
    }
    .phil-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px;
      align-items: start;
    }
    @media (max-width: 700px) {
      .phil-grid { grid-template-columns: 1fr; gap: 40px; }
    }
    .phil-h2 {
      font-size: clamp(26px, 4vw, 38px);
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.15;
      margin-bottom: 16px;
    }
    .phil-lead {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.75;
    }
    .phil-items {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }
    .phil-item {}
    .phil-item-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .phil-item-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }

    /* ── CTA ── */
    .cta-section {
      padding: 80px 0;
      text-align: center;
    }
    .cta-h2 {
      font-size: clamp(26px, 4vw, 38px);
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 14px;
    }
    .cta-lead {
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 36px;
    }
    .btn-primary {
      display: inline-block;
      background: var(--black);
      color: #fff;
      padding: 14px 36px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--red); }

    /* ── Footer ── */
    .footer-wrap { max-width: 1080px; margin: 0 auto; }
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      nav { padding: 0 20px; }
      .nav-center { display: none; }
      .wrap, footer { padding-left: 20px; padding-right: 20px; }
      footer { flex-direction: column; gap: 6px; text-align: center; }
    }
  </style>

    function buildList(ulId, items, tag) {
      var ul = document.getElementById(ulId);
      if (!ul) return;
      ul.innerHTML = '';
      items.forEach(function(text) {
        var li = document.createElement('li');
        li.textContent = text;
        ul.appendChild(li);
      });
    }

    function buildSteps(containerId, steps) {
      var el = document.getElementById(containerId);
      if (!el) return;
      el.innerHTML = '';
      steps.forEach(function(s, i) {
        var div = document.createElement('div');
        div.className = 'step';
        div.innerHTML =
          '<div class="step-num">' + (i + 1) + '</div>' +
          '<div class="step-body">' +
            '<div class="step-title">' + s[0] + '</div>' +
            '<div class="step-desc">'  + s[1] + '</div>' +
          '</div>';
        el.appendChild(div);
      });
    }

    function buildPhil(containerId, items) {
      var el = document.getElementById(containerId);
      if (!el) return;
      el.innerHTML = '';
      items.forEach(function(item) {
        var div = document.createElement('div');
        div.className = 'phil-item';
        div.innerHTML =
          '<div class="phil-item-title">' + item[0] + '</div>' +
          '<div class="phil-item-desc">'  + item[1] + '</div>';
        el.appendChild(div);
      });
    }

    function setLang(l) {
      lang = l;
      var c = copy[l];

      simpleIds.forEach(function(pair) {
        var el = document.getElementById(pair[0]);
        if (el) el.textContent = c[pair[1]];
      });

      // Multi-line headings
      document.getElementById('t-page-h1').innerHTML  = c['page-h1'].replace('\n', '<br>');
      document.getElementById('t-phil-h2').innerHTML  = c['phil-h2'].replace('\n', '<br>');
      document.getElementById('t-cta-h2').textContent = c['cta-h2'];

      // Lists
      buildList('s1-includes', c['s1-includes']);
      buildList('s1-brings',   c['s1-brings']);
      buildList('s2-includes', c['s2-includes']);
      buildList('s2-brings',   c['s2-brings']);
      buildList('s3-includes', c['s3-includes']);
      buildList('s3-why',      c['s3-why']);

      // Steps
      buildSteps('s1-steps', c['s1-steps']);
      buildSteps('s2-steps', c['s2-steps']);

      // Philosophy
      buildPhil('phil-items', c['phil-items']);

      document.getElementById('flag').textContent       = l === 'es' ? '🇬🇧' : '🇪🇸';
      document.getElementById('lang-label').textContent = l === 'es' ? 'EN' : 'ES';
      document.documentElement.lang = l;
    }

    function toggleLang() { setLang(lang === 'es' ? 'en' : 'es'); }

    setLang('es');
