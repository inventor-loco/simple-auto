<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Auto — Soluciones digitales para autónomos y pymes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #111111;
      --red:    #D0021B;
      --bg:     #F7F7F7;
      --white:  #FFFFFF;
      --muted:  #888888;
      --border: #DDDDDD;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--black);
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 100;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      background: rgba(247,247,247,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--black);
    }
    .nav-logo .auto { color: var(--red); }

    .nav-center {
      display: flex;
      gap: 32px;
    }
    .nav-center a {
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .nav-center a:hover { color: var(--black); }

    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      user-select: none;
      transition: color 0.15s;
    }
    .lang-toggle:hover { color: var(--black); }

    /* ── Shared ── */
    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* ── Hero ── */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-top: 60px;
    }
    .hero-inner {
      max-width: 1080px;
      margin: 0 auto;
      padding: 100px 40px 80px;
    }

    /* P — Problem */
    .problem {
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1.1;
      color: var(--black);
      max-width: 780px;
      margin-bottom: 28px;
      transition: opacity 0.35s ease;
      min-height: 1.1em;
    }

    /* A — Agitate */
    .agitate {
      font-size: clamp(16px, 2vw, 19px);
      font-weight: 500;
      color: var(--red);
      margin-bottom: 20px;
      max-width: 560px;
    }

    /* S — Solve */
    .solve {
      font-size: clamp(15px, 1.8vw, 17px);
      color: var(--muted);
      line-height: 1.7;
      max-width: 520px;
      margin-bottom: 40px;
    }

    .btn-primary {
      display: inline-block;
      background: var(--black);
      color: #fff;
      padding: 14px 32px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--red); }

    .scope-note {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
    }

    /* ── Sections ── */
    .section {
      border-top: 1px solid var(--border);
      padding: 96px 0;
    }

    .section-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 12px;
    }

    .section-h2 {
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.15;
      margin-bottom: 14px;
    }

    .section-lead {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 500px;
      margin-bottom: 64px;
    }

    /* ── Services ── */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    @media (max-width: 720px) {
      .services-grid { grid-template-columns: 1fr; }
    }

    .svc-card {
      background: var(--white);
      padding: 44px 36px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .svc-icon { font-size: 28px; line-height: 1; }

    .svc-name {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .svc-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.75;
      flex: 1;
    }

    .svc-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 9px;
      border-radius: 4px;
      align-self: flex-start;
    }
    .svc-badge.on   { background: var(--black); color: #fff; }
    .svc-badge.soon { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }

    /* ── Portfolio ── */
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .proj-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }
    .proj-card:hover { border-color: var(--black); transform: translateY(-3px); }

    .proj-thumb {
      height: 190px;
      display: flex;
      align-items: flex-end;
      padding: 20px 24px;
    }
    .proj-thumb-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    .proj-body { padding: 22px 24px 26px; }

    .proj-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 7px;
    }

    .proj-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 18px;
    }

    .proj-link {
      font-size: 13px;
      font-weight: 600;
      color: var(--black);
      text-decoration: none;
      transition: color 0.15s;
    }
    .proj-link:hover { color: var(--red); }

    /* ── Contact ── */
    .contact-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }
    @media (max-width: 680px) {
      .contact-layout { grid-template-columns: 1fr; gap: 40px; }
    }

    .form-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .form-stack input,
    .form-stack textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 13px 16px;
      font-size: 15px;
      font-family: inherit;
      background: #fff;
      color: var(--black);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-stack input:focus,
    .form-stack textarea:focus { border-color: var(--black); }
    .form-stack input::placeholder,
    .form-stack textarea::placeholder { color: #BBBBBB; }
    .form-stack textarea { resize: vertical; min-height: 90px; }

    .form-stack button {
      width: 100%;
      border: none;
      background: var(--black);
      color: #fff;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .form-stack button:hover:not(:disabled) { background: var(--red); }
    .form-stack button:disabled { opacity: 0.4; cursor: default; }

    .form-error  { font-size: 13px; color: var(--red); }
    .success-msg { font-size: 15px; font-weight: 500; color: var(--black); }

    /* ── Footer ── */
    .footer-wrap {
      max-width: 1080px;
      margin: 0 auto;
    }
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      nav { padding: 0 20px; }
      .nav-center { display: none; }
      .hero-inner, .wrap, footer { padding-left: 20px; padding-right: 20px; }
      footer { flex-direction: column; gap: 6px; text-align: center; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav>
    <a class="nav-logo" href="#"><span>simple</span><span class="auto">auto</span></a>
    <div class="nav-center">
      <a href="services.html" id="nav-services"></a>
      <a href="#portfolio"    id="nav-portfolio"></a>
      <a href="#contact"      id="nav-contact"></a>
    </div>
    <div class="lang-toggle" onclick="toggleLang()">
      <span id="flag">🇬🇧</span>
      <span id="lang-label">EN</span>
    </div>
  </nav>

  <!-- Hero — PAS -->
  <div class="hero">
    <div class="hero-inner">
      <p class="problem" id="problem-text"></p>
      <p class="agitate" id="t-agitate"></p>
      <p class="solve"   id="t-solve"></p>
      <a href="#contact" class="btn-primary" id="t-cta"></a>
      <p class="scope-note" id="t-scope"></p>
    </div>
  </div>

  <!-- Services -->
  <section class="section" id="services">
    <div class="wrap">
      <p class="section-eyebrow" id="t-svc-ey"></p>
      <h2 class="section-h2"    id="t-svc-h2"></h2>
      <p class="section-lead"   id="t-svc-lead"></p>
      <div class="services-grid">
        <div class="svc-card">
          <div class="svc-icon">🌐</div>
          <div class="svc-name" id="t-s1-name"></div>
          <p  class="svc-desc"  id="t-s1-desc"></p>
          <span class="svc-badge on"   id="t-s1-badge"></span>
        </div>
        <div class="svc-card">
          <div class="svc-icon">📈</div>
          <div class="svc-name" id="t-s2-name"></div>
          <p  class="svc-desc"  id="t-s2-desc"></p>
          <span class="svc-badge on"   id="t-s2-badge"></span>
        </div>
        <div class="svc-card">
          <div class="svc-icon">⚙️</div>
          <div class="svc-name" id="t-s3-name"></div>
          <p  class="svc-desc"  id="t-s3-desc"></p>
          <span class="svc-badge soon" id="t-s3-badge"></span>
        </div>
      </div>
      <p style="margin-top:32px;">
        <a href="services.html" id="t-svc-more" style="font-size:14px;font-weight:600;color:var(--black);text-decoration:none;transition:color 0.15s;" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--black)'"></a>
      </p>
    </div>
  </section>

  <!-- Portfolio -->
  <section class="section" id="portfolio">
    <div class="wrap">
      <p class="section-eyebrow" id="t-port-ey"></p>
      <h2 class="section-h2"    id="t-port-h2"></h2>
      <p class="section-lead"   id="t-port-lead"></p>
      <div class="portfolio-grid">

        <div class="proj-card">
          <div class="proj-thumb" style="background:linear-gradient(135deg,#1a1a2e,#16213e);">
            <span class="proj-thumb-label">Web</span>
          </div>
          <div class="proj-body">
            <div class="proj-name">Proyecto 01</div>
            <p class="proj-desc" id="t-p1-desc"></p>
            <a href="#" class="proj-link" id="t-p1-link"></a>
          </div>
        </div>

        <div class="proj-card">
          <div class="proj-thumb" style="background:linear-gradient(135deg,#1b4332,#2d6a4f);">
            <span class="proj-thumb-label">Web</span>
          </div>
          <div class="proj-body">
            <div class="proj-name">Proyecto 02</div>
            <p class="proj-desc" id="t-p2-desc"></p>
            <a href="#" class="proj-link" id="t-p2-link"></a>
          </div>
        </div>

        <div class="proj-card">
          <div class="proj-thumb" style="background:linear-gradient(135deg,#3d0c02,#7a1010);">
            <span class="proj-thumb-label">Web</span>
          </div>
          <div class="proj-body">
            <div class="proj-name">Proyecto 03</div>
            <p class="proj-desc" id="t-p3-desc"></p>
            <a href="#" class="proj-link" id="t-p3-link"></a>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- Contact -->
  <section class="section" id="contact">
    <div class="wrap">
      <div class="contact-layout">
        <div>
          <p class="section-eyebrow" id="t-ct-ey"></p>
          <h2 class="section-h2"    id="t-ct-h2"></h2>
          <p class="section-lead"   id="t-ct-lead" style="margin-bottom:0;"></p>
        </div>
        <div>
          <div id="form-wrap" class="form-stack">
            <input  type="text"  id="f-name" />
            <input  type="email" id="f-email" />
            <input  type="tel"   id="f-phone" />
            <textarea            id="f-message" rows="3"></textarea>
            <button type="button" id="t-btn" onclick="handleSubmit()"></button>
            <p class="form-error hidden" id="form-error"></p>
          </div>
          <p class="success-msg hidden" id="success-msg"></p>
        </div>
      </div>
    </div>
  </section>

  <div class="footer-wrap">
    <footer>
      <span>© 2026 Simple Auto</span>
      <span id="t-footer"></span>
    </footer>
  </div>

  <script>
    var lang = 'es';

    var problems = {
      es: [
        'Tu negocio es bueno.\nNadie lo sabe.',
        'Tus clientes te buscan en Google.\nNo te encuentran.',
        'Tu competencia ya tiene web.\nTú, todavía no.',
        'Trabajas duro.\nTu web no hace lo mismo.'
      ],
      en: [
        'Your business is good.\nNobody knows it.',
        'Your clients search for you online.\nThey can\'t find you.',
        'Your competition has a website.\nYou don\'t. Yet.',
        'You work hard.\nYour website doesn\'t.'
      ]
    };
    var probIdx = 0;
    var probEl;

    var copy = {
      es: {
        'nav-services':  'Servicios',
        'nav-portfolio': 'Proyectos',
        'nav-contact':   'Contacto',

        agitate: 'Cada día sin presencia digital, un cliente va a otro.',
        solve:   'Construimos tu web, tu SEO y tus herramientas. En semanas, no meses.',
        cta:     'Hablemos',
        scope:   'Ponemos la estructura. El contenido —fotos y textos— lo aportas tú.',

        'svc-ey':   'Servicios',
        'svc-h2':   'Lo que hacemos',
        'svc-lead': 'Tres servicios. Sin paquetes innecesarios.',
        'svc-more': 'Ver qué incluye cada servicio →',
        's1-name':  'Diseño Web',
        's1-desc':  'Tu sitio desde cero. Rápido, profesional y hecho para convertir visitas en clientes. A medida, sin plantillas.',
        's1-badge': 'Disponible',
        's2-name':  'SEO Local',
        's2-desc':  'Aparecer en Google no es suerte. Te posicionamos para que te encuentren los clientes correctos, antes que a tu competencia.',
        's2-badge': 'Disponible',
        's3-name':  'Automatización',
        's3-desc':  'Reservas, formularios, flujos automáticos. La tecnología trabajando para ti, sin que tengas que entenderla.',
        's3-badge': 'Próximamente',

        'port-ey':   'Proyectos',
        'port-h2':   'Trabajo reciente',
        'port-lead': 'Sitios que hemos construido para negocios reales.',
        'p-desc':    'Sitio web para negocio local. Diseño limpio, carga rápida, optimizado para móvil.',
        'p-link':    'Ver sitio →',

        'ct-ey':   'Contacto',
        'ct-h2':   'Cuéntanos tu situación.',
        'ct-lead': 'Sin compromiso. Te respondemos en menos de 24 horas.',
        ph_name:   'Nombre',
        ph_email:  'Correo electrónico',
        ph_phone:  'Teléfono',
        ph_msg:    'Describe brevemente tu negocio (opcional)',
        btn:       'Enviar',
        success:   'Listo. Te contactamos pronto.',
        error:     'Algo salió mal. Intenta de nuevo.',

        footer: 'Digital para autónomos y pequeñas empresas.'
      },
      en: {
        'nav-services':  'Services',
        'nav-portfolio': 'Work',
        'nav-contact':   'Contact',

        agitate: 'Every day without a digital presence, a client goes elsewhere.',
        solve:   'We build your website, your SEO, and your tools. In weeks, not months.',
        cta:     'Let\'s talk',
        scope:   'We build the structure. Content — photos and copy — is yours to provide.',

        'svc-ey':   'Services',
        'svc-h2':   'What we do',
        'svc-lead': 'Three services. No unnecessary packages.',
        'svc-more': 'See what each service includes →',
        's1-name':  'Web Design',
        's1-desc':  'Your site from scratch. Fast, professional, and built to turn visitors into clients. Custom, no templates.',
        's1-badge': 'Available',
        's2-name':  'Local SEO',
        's2-desc':  'Showing up on Google isn\'t luck. We position you so the right clients find you, before your competition.',
        's2-badge': 'Available',
        's3-name':  'Automation',
        's3-desc':  'Bookings, forms, automated workflows. Technology working for you, without needing to understand it.',
        's3-badge': 'Coming soon',

        'port-ey':   'Work',
        'port-h2':   'Recent projects',
        'port-lead': 'Sites we\'ve built for real businesses.',
        'p-desc':    'Website for a local business. Clean design, fast load times, mobile-optimized.',
        'p-link':    'View site →',

        'ct-ey':   'Contact',
        'ct-h2':   'Tell us your situation.',
        'ct-lead': 'No strings attached. We\'ll get back to you within 24 hours.',
        ph_name:   'Name',
        ph_email:  'Email address',
        ph_phone:  'Phone',
        ph_msg:    'Briefly describe your business (optional)',
        btn:       'Send',
        success:   'Got it. We\'ll be in touch soon.',
        error:     'Something went wrong. Please try again.',

        footer: 'Digital for independent workers and small businesses.'
      }
    };

    var idMap = [
      ['nav-services',  'nav-services'],
      ['nav-portfolio', 'nav-portfolio'],
      ['nav-contact',   'nav-contact'],
      ['t-agitate',     'agitate'],
      ['t-solve',       'solve'],
      ['t-cta',         'cta'],
      ['t-scope',       'scope'],
      ['t-svc-ey',      'svc-ey'],
      ['t-svc-h2',      'svc-h2'],
      ['t-svc-lead',    'svc-lead'],
      ['t-svc-more',    'svc-more'],
      ['t-s1-name',     's1-name'],
      ['t-s1-desc',     's1-desc'],
      ['t-s1-badge',    's1-badge'],
      ['t-s2-name',     's2-name'],
      ['t-s2-desc',     's2-desc'],
      ['t-s2-badge',    's2-badge'],
      ['t-s3-name',     's3-name'],
      ['t-s3-desc',     's3-desc'],
      ['t-s3-badge',    's3-badge'],
      ['t-port-ey',     'port-ey'],
      ['t-port-h2',     'port-h2'],
      ['t-port-lead',   'port-lead'],
      ['t-p1-desc',     'p-desc'],
      ['t-p2-desc',     'p-desc'],
      ['t-p3-desc',     'p-desc'],
      ['t-p1-link',     'p-link'],
      ['t-p2-link',     'p-link'],
      ['t-p3-link',     'p-link'],
      ['t-ct-ey',       'ct-ey'],
      ['t-ct-h2',       'ct-h2'],
      ['t-ct-lead',     'ct-lead'],
      ['t-btn',         'btn'],
      ['t-footer',      'footer']
    ];

    function renderProblem() {
      if (!probEl) return;
      var lines = problems[lang][probIdx].split('\n');
      probEl.innerHTML = lines.join('<br>');
    }

    function cycleProblem() {
      probEl.style.opacity = '0';
      setTimeout(function() {
        probIdx = (probIdx + 1) % problems[lang].length;
        renderProblem();
        probEl.style.opacity = '1';
      }, 350);
    }

    function setLang(l) {
      lang = l;
      var c = copy[l];
      idMap.forEach(function(pair) {
        var el = document.getElementById(pair[0]);
        if (el) el.textContent = c[pair[1]];
      });
      renderProblem();
      document.getElementById('f-name').placeholder    = c.ph_name;
      document.getElementById('f-email').placeholder   = c.ph_email;
      document.getElementById('f-phone').placeholder   = c.ph_phone;
      document.getElementById('f-message').placeholder = c.ph_msg;
      document.getElementById('flag').textContent       = l === 'es' ? '🇬🇧' : '🇪🇸';
      document.getElementById('lang-label').textContent = l === 'es' ? 'EN' : 'ES';
      document.documentElement.lang = l;
    }

    function toggleLang() { setLang(lang === 'es' ? 'en' : 'es'); }

    function handleSubmit() {
      var email = document.getElementById('f-email').value.trim();
      if (!email) { document.getElementById('f-email').focus(); return; }

      var btn = document.getElementById('t-btn');
      btn.disabled = true;
      btn.textContent = '...';

      var name  = document.getElementById('f-name').value.trim();
      var phone = document.getElementById('f-phone').value.trim();
      var msg   = document.getElementById('f-message').value.trim();

      var parts = [];
      if (name)  parts.push('Nombre: '   + name);
      if (phone) parts.push('Teléfono: ' + phone);
      if (msg)   parts.push('Mensaje: '  + msg);

      var data = new FormData();
      data.append('email',   email);
      data.append('message', parts.join('\n'));

      fetch('https://formspree.io/f/mkoydwkl', {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      })
      .then(function(r) { return r.json().then(function(j) { return { ok: r.ok, j: j }; }); })
      .then(function(res) {
        if (res.ok) {
          document.getElementById('form-wrap').classList.add('hidden');
          var el = document.getElementById('success-msg');
          el.textContent = copy[lang].success;
          el.classList.remove('hidden');
        } else { throw new Error(); }
      })
      .catch(function() {
        var err = document.getElementById('form-error');
        err.textContent = copy[lang].error;
        err.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = copy[lang].btn;
      });
    }

    probEl = document.getElementById('problem-text');
    setLang('es');
    setInterval(cycleProblem, 3500);
  </script>
